<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舞台チケット抽選管理</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    color: #333;
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

header {
    text-align: center;
    color: white;
    margin-bottom: 30px;
}

header h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

.subtitle {
    font-size: 1.1rem;
    opacity: 0.9;
}

main {
    display: grid;
    gap: 20px;
}

/* 入力セクション */
.input-section {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

.input-section h2 {
    color: #667eea;
    margin-bottom: 20px;
    font-size: 1.5rem;
}

.form-group {
    margin-bottom: 20px;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #555;
}

input[type="text"],
input[type="date"],
input[type="file"],
textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 1rem;
    transition: border-color 0.3s;
}

input[type="text"]:focus,
input[type="date"]:focus,
textarea:focus {
    outline: none;
    border-color: #667eea;
}

textarea {
    resize: vertical;
    font-family: inherit;
}

.warning-message {
    background: #fff3cd;
    border: 2px solid #ffc107;
    color: #856404;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 15px;
    font-weight: 600;
}

.btn-primary {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

.btn-primary:active {
    transform: translateY(0);
}

/* 画像アップロード */
.image-upload-area {
    border: 2px dashed #667eea;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    background: #f8f9fa;
}

.btn-upload {
    padding: 12px 24px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    transition: all 0.3s;
}

.btn-upload:hover {
    background: #5568d3;
    transform: translateY(-2px);
}

#imagePreview {
    margin-top: 15px;
}

#previewImg {
    max-width: 100%;
    max-height: 300px;
    border-radius: 8px;
    margin-bottom: 15px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

.progress-bar {
    width: 100%;
    height: 20px;
    background: #e0e0e0;
    border-radius: 10px;
    overflow: hidden;
    margin: 10px 0;
}

#progressFill {
    height: 100%;
    background: linear-gradient(90deg, #667eea, #764ba2);
    width: 0%;
    transition: width 0.3s;
}

#progressText {
    color: #666;
    font-size: 0.9rem;
    margin-top: 5px;
}

/* 候補日入力 */
#candidateDatesContainer {
    display: grid;
    gap: 10px;
    margin-bottom: 10px;
}

.candidate-date-input {
    display: flex;
    gap: 10px;
    align-items: center;
}

.candidate-date {
    flex: 2;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 1rem;
}

.time-inputs {
    display: flex;
    align-items: center;
    gap: 5px;
    flex: 1;
}

.candidate-hour,
.candidate-minute {
    padding: 10px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 1rem;
    width: 70px;
    text-align: center;
    background: white;
    cursor: pointer;
    transition: border-color 0.3s;
}

.candidate-hour:focus,
.candidate-minute:focus {
    outline: none;
    border-color: #667eea;
}

.time-separator {
    font-weight: bold;
    font-size: 1.2rem;
    color: #666;
}

.btn-remove {
    padding: 8px 12px;
    background: #dc3545;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
}

.btn-remove:hover {
    background: #c82333;
}

.btn-add {
    width: 100%;
    padding: 10px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
}

.btn-add:hover {
    background: #218838;
}

.btn-secondary {
    padding: 12px 24px;
    background: #6c757d;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    margin-left: 10px;
    transition: all 0.3s;
}

.btn-secondary:hover {
    background: #5a6268;
}

/* チェックボックスグループ */
.checkbox-group {
    display: grid;
    gap: 10px;
}

.checkbox-item {
    display: flex;
    align-items: center;
    padding: 12px;
    background: #f8f9fa;
    border-radius: 8px;
    border: 2px solid #e0e0e0;
    transition: all 0.3s;
    position: relative;
}

.checkbox-item:hover {
    border-color: #667eea;
    background: #f0f4ff;
}

.checkbox-item.already-applied {
    background: #fff3cd;
    border-color: #ffc107;
}

.checkbox-item.already-applied::after {
    content: '📅 申込済';
    position: absolute;
    right: 12px;
    font-size: 0.85rem;
    color: #856404;
    font-weight: 600;
}

.checkbox-item.already-won {
    background: #f8d7da;
    border-color: #f5576c;
}

.checkbox-item.already-won::after {
    content: '🎊 当落発表済';
    position: absolute;
    right: 12px;
    font-size: 0.85rem;
    color: #721c24;
    font-weight: 600;
}

.checkbox-item input[type="checkbox"] {
    width: 20px;
    height: 20px;
    margin-right: 10px;
    cursor: pointer;
}

.checkbox-item label {
    margin: 0;
    cursor: pointer;
    flex: 1;
}

/* セレクトボックス */
select {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 1rem;
    background: white;
    cursor: pointer;
    transition: border-color 0.3s;
}

select:focus {
    outline: none;
    border-color: #667eea;
}

/* 一覧セクション */
.list-section {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

.list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 15px;
}

.list-header h2 {
    color: #667eea;
    font-size: 1.5rem;
}

.filter-buttons {
    display: flex;
    gap: 10px;
}

.filter-btn {
    padding: 8px 16px;
    border: 2px solid #667eea;
    background: white;
    color: #667eea;
    border-radius: 20px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
}

.filter-btn:hover {
    background: #f0f0f0;
}

.filter-btn.active {
    background: #667eea;
    color: white;
}

.lottery-list {
    display: grid;
    gap: 15px;
}

.empty-message {
    text-align: center;
    color: #999;
    padding: 40px;
    font-size: 1.1rem;
}

.lottery-item {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 10px;
    border-left: 5px solid #667eea;
    transition: transform 0.2s, box-shadow 0.2s;
}

.lottery-item:hover {
    transform: translateX(5px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
}

.lottery-item.past {
    opacity: 0.7;
    border-left-color: #999;
}

.lottery-item.conflict {
    border-left-color: #dc3545;
    background: #fff5f5;
}

.lottery-item.won {
    border-left-color: #f5576c;
    background: linear-gradient(135deg, #fff5f7 0%, #ffe5e9 100%);
}

.lottery-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 10px;
}

.stage-name {
    font-size: 1.2rem;
    font-weight: 700;
    color: #333;
    flex: 1;
}

.lottery-actions {
    display: flex;
    gap: 8px;
}

.btn-icon {
    padding: 6px 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
}

.btn-edit {
    background: #17a2b8;
    color: white;
}

.btn-edit:hover {
    background: #138496;
}

.btn-delete {
    background: #dc3545;
    color: white;
}

.btn-delete:hover {
    background: #c82333;
}

.lottery-dates {
    display: grid;
    gap: 8px;
    margin-bottom: 10px;
}

.date-info {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    color: #666;
}

.date-label {
    font-weight: 600;
    min-width: 120px;
    flex-shrink: 0;
}

.date-value {
    color: #333;
    flex: 1;
}

.date-value.date-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.date-badge {
    display: inline-block;
    padding: 4px 10px;
    background: #e8f0fe;
    border: 1px solid #1a73e8;
    border-radius: 12px;
    font-size: 0.85rem;
    color: #1967d2;
    white-space: nowrap;
}

.date-badge.applied {
    background: #e6f4ea;
    border-color: #188038;
    color: #137333;
}

.date-value.collapsed {
    max-height: 100px;
    overflow: hidden;
    position: relative;
}

.date-value.collapsed::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 30px;
    background: linear-gradient(transparent, white);
}

.show-more-btn {
    display: inline-block;
    margin-top: 5px;
    padding: 4px 12px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
}

.show-more-btn:hover {
    background: #5568d3;
}

.lottery-notes {
    margin-top: 10px;
    padding: 10px;
    background: white;
    border-radius: 5px;
    color: #666;
    font-size: 0.95rem;
}

.conflict-badge {
    display: inline-block;
    background: #dc3545;
    color: white;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-top: 8px;
}

.won-badge {
    display: inline-block;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    color: white;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-left: 10px;
}

/* レスポンシブ対応 */
@media (max-width: 768px) {
    header h1 {
        font-size: 2rem;
    }

    .form-row {
        grid-template-columns: 1fr;
    }

    .list-header {
        flex-direction: column;
        align-items: stretch;
    }

    .filter-buttons {
        justify-content: center;
    }

    .lottery-header {
        flex-direction: column;
        gap: 10px;
    }

    .lottery-actions {
        width: 100%;
        justify-content: flex-end;
    }

    .btn-secondary {
        margin-left: 0;
        margin-top: 10px;
        width: 100%;
    }
}

/* ビュー切り替え */
.view-section {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    margin-bottom: 20px;
}

.view-toggle {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.view-btn {
    padding: 12px 24px;
    border: 2px solid #667eea;
    background: white;
    color: #667eea;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 1rem;
    transition: all 0.3s;
}

.view-btn:hover {
    background: #f0f0f0;
}

.view-btn.active {
    background: #667eea;
    color: white;
}

/* カレンダーセクション */
.calendar-section {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.calendar-header h2 {
    color: #667eea;
    font-size: 1.5rem;
    margin: 0;
}

.btn-nav {
    padding: 10px 20px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.2rem;
    font-weight: 600;
    transition: all 0.3s;
}

.btn-nav:hover {
    background: #5568d3;
    transform: scale(1.05);
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    margin-bottom: 20px;
    border: 1px solid #dadce0;
    border-radius: 8px;
    overflow: hidden;
}

.calendar-day-header {
    text-align: center;
    font-weight: 600;
    padding: 12px;
    background: #f8f9fa;
    color: #70757a;
    font-size: 0.85rem;
    text-transform: uppercase;
    border-bottom: 1px solid #dadce0;
}

.calendar-day {
    min-height: 120px;
    padding: 4px;
    border-right: 1px solid #dadce0;
    border-bottom: 1px solid #dadce0;
    background: white;
    position: relative;
    transition: background-color 0.2s;
    display: flex;
    flex-direction: column;
}

.calendar-day:nth-child(7n) {
    border-right: none;
}

.calendar-day:hover {
    background-color: #f8f9fa;
}

.calendar-day.other-month {
    background: #fafafa;
}

.calendar-day.other-month .day-number {
    color: #dadce0;
}

.calendar-day.today {
    background-color: #e8f0fe;
}

.calendar-day.today .day-number {
    background: #1a73e8;
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
}

.day-number {
    font-size: 0.75rem;
    font-weight: 500;
    color: #3c4043;
    padding: 4px;
    text-align: right;
    margin-bottom: 2px;
}

.day-events {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
    overflow-y: auto;
}

.event-item {
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
    border-left: 3px solid;
    background: white;
}

.event-item:hover {
    opacity: 0.8;
    transform: translateX(2px);
}

.event-performance {
    border-left-color: #1a73e8;
    background: #e8f0fe;
    color: #1967d2;
}

.event-applied {
    border-left-color: #188038;
    background: #e6f4ea;
    color: #137333;
}

.event-won {
    border-left-color: #d93025;
    background: #fce8e6;
    color: #c5221f;
}

.event-deadline {
    border-left-color: #f9ab00;
    background: #fef7e0;
    color: #e37400;
}

.event-result {
    border-left-color: #9334e6;
    background: #f3e8fd;
    color: #7627bb;
}

.event-icon {
    font-size: 0.8rem;
}

.event-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
}

/* カレンダー凡例 */
.calendar-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    padding: 15px;
    background: #f8f9fa;
    border-radius: 8px;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
}

.legend-color {
    width: 20px;
    height: 20px;
    border-radius: 4px;
}

/* カレンダーのレスポンシブ対応 */
@media (max-width: 768px) {
    .view-toggle {
        flex-direction: column;
    }

    .view-btn {
        width: 100%;
    }

    .calendar-day {
        min-height: 100px;
        padding: 3px;
    }

    .event-item {
        font-size: 0.6rem;
        padding: 1px 4px;
    }

    .event-icon {
        font-size: 0.7rem;
    }

    .calendar-legend {
        flex-direction: column;
        align-items: flex-start;
    }
}

/* Made with Bob */

</style>
    <!-- Tesseract.js for OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎭 舞台チケット抽選管理</h1>
            <p class="subtitle">候補日から申し込み日を選択して、重複を防ぎましょう</p>
        </header>

        <main>
            <!-- 入力フォーム -->
            <section class="input-section">
                <h2>新規抽選登録</h2>
                <form id="lotteryForm">
                    <!-- 舞台名 -->
                    <div class="form-group">
                        <label for="stageName">舞台名 *</label>
                        <input type="text" id="stageName" required placeholder="例: ミュージカル「レ・ミゼラブル」">
                    </div>

                    <!-- 画像アップロード -->
                    <div class="form-group">
                        <label for="imageUpload">📷 画像から日付を読み取る（任意）</label>
                        <div class="image-upload-area">
                            <input type="file" id="imageUpload" accept="image/*" multiple style="display: none;">
                            <button type="button" class="btn-upload" onclick="document.getElementById('imageUpload').click()">
                                📁 画像を選択（複数可）
                            </button>
                            <div id="imagePreviewContainer" style="display: none;">
                                <div id="imagePreviews"></div>
                                <button type="button" class="btn-secondary" id="analyzeBtn">🔍 すべての画像から日付を読み取る</button>
                                <div id="ocrProgress" style="display: none;">
                                    <div class="progress-bar">
                                        <div id="progressFill"></div>
                                    </div>
                                    <p id="progressText">読み取り中...</p>
                                </div>
                                <div id="ocrResult" style="display: none; margin-top: 15px;"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 公演日 -->
                    <div class="form-group">
                        <label>🗓️ 公演日と時間</label>
                        <div id="candidateDatesContainer">
                            <div class="candidate-date-input">
                                <input type="date" class="candidate-date" placeholder="公演日1">
                                <div class="time-inputs">
                                    <select class="candidate-hour">
                                        <option value="">--</option>
                                        <option value="10">10</option>
                                        <option value="11">11</option>
                                        <option value="12">12</option>
                                        <option value="13">13</option>
                                        <option value="14">14</option>
                                        <option value="15">15</option>
                                        <option value="16">16</option>
                                        <option value="17">17</option>
                                        <option value="18">18</option>
                                        <option value="19">19</option>
                                        <option value="20">20</option>
                                        <option value="21">21</option>
                                    </select>
                                    <span class="time-separator">:</span>
                                    <select class="candidate-minute">
                                        <option value="">--</option>
                                        <option value="00">00</option>
                                        <option value="30">30</option>
                                    </select>
                                </div>
                                <button type="button" class="btn-remove" onclick="removeCandidateDate(this)">✕</button>
                            </div>
                        </div>
                        <button type="button" class="btn-add" id="addCandidateBtn">+ 公演日を追加</button>
                    </div>

                    <!-- 抽選期間 -->
                    <div class="form-group">
                        <label>📅 抽選期間</label>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="lotteryStartDate">開始日</label>
                                <input type="date" id="lotteryStartDate">
                            </div>
                            <div class="form-group">
                                <label for="lotteryEndDate">締切日 *</label>
                                <input type="date" id="lotteryEndDate" required>
                            </div>
                        </div>
                    </div>

                    <!-- 結果発表日 -->
                    <div class="form-group">
                        <label for="resultDate">🎯 結果発表日</label>
                        <input type="date" id="resultDate">
                    </div>

                    <!-- 申し込んだ公演日 -->
                    <div class="form-group" id="appliedDatesGroup" style="display: none;">
                        <label>✅ 申し込んだ公演日を選択（任意）</label>
                        <div id="appliedDatesContainer" class="checkbox-group">
                            <!-- 動的に生成 -->
                        </div>
                    </div>

                    <!-- 当落発表日 -->
                    <div class="form-group" id="wonDateGroup" style="display: none;">
                        <label for="wonDate">🎊 当落発表日</label>
                        <select id="wonDate">
                            <option value="">未選択</option>
                            <!-- 動的に生成 -->
                        </select>
                    </div>

                    <!-- メモ -->
                    <div class="form-group">
                        <label for="notes">📝 メモ</label>
                        <textarea id="notes" rows="2" placeholder="例: 先行抽選、一般販売など"></textarea>
                    </div>

                    <!-- 警告メッセージ -->
                    <div id="warningMessage" class="warning-message" style="display: none;">
                        ⚠️ 選択した日付は既に他の抽選と重複しています！
                    </div>

                    <button type="submit" class="btn-primary">登録</button>
                    <button type="button" class="btn-secondary" id="cancelBtn" style="display: none;">キャンセル</button>
                </form>
            </section>

            <!-- ビュー切り替え -->
            <section class="view-section">
                <div class="view-toggle">
                    <button class="view-btn active" data-view="list">📋 リスト表示</button>
                    <button class="view-btn" data-view="calendar">📅 カレンダー表示</button>
                </div>
            </section>

            <!-- カレンダービュー -->
            <section class="calendar-section" id="calendarSection" style="display: none;">
                <div class="calendar-header">
                    <button class="btn-nav" id="prevMonth">◀</button>
                    <h2 id="currentMonth"></h2>
                    <button class="btn-nav" id="nextMonth">▶</button>
                </div>
                <div id="calendar" class="calendar-grid"></div>
                <div class="calendar-legend">
                    <div class="legend-item">
                        <span class="legend-color" style="background: #667eea;"></span>
                        <span>公演日</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #28a745;"></span>
                        <span>申し込んだ日</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #f5576c;"></span>
                        <span>当落発表日</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #ffc107;"></span>
                        <span>抽選締切日</span>
                    </div>
                </div>
            </section>

            <!-- 抽選一覧 -->
            <section class="list-section" id="listSection">
                <div class="list-header">
                    <h2>登録済み抽選</h2>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">すべて</button>
                        <button class="filter-btn" data-filter="upcoming">今後</button>
                        <button class="filter-btn" data-filter="past">過去</button>
                        <button class="filter-btn" data-filter="won">当選</button>
                    </div>
                </div>

                <div id="lotteryList" class="lottery-list">
                    <p class="empty-message">まだ抽選が登録されていません</p>
                </div>
            </section>
        </main>
    </div>

    <script>
// --- 画像読み込みと保存の修正プログラム ---
let currentImageData = ""; // 画像データを一時保存する変数

const imageUpload = document.getElementById('imageUpload');
const imagePreviews = document.getElementById('imagePreviews');
const previewContainer = document.getElementById('imagePreviewContainer');

// 1. 画像を選択した時に、iPhoneでも読み取れる形式に変換する
imageUpload.onchange = (e) => {
    const files = e.target.files;
    imagePreviews.innerHTML = '';
    previewContainer.style.display = 'block';

    if (files && files[0]) {
        const reader = new FileReader();
        reader.onload = (f) => {
            currentImageData = f.target.result; // ここで画像を文字データに変換
            const img = document.createElement('img');
            img.src = currentImageData;
            img.id = 'previewImg';
            img.style.maxWidth = '100px';
            imagePreviews.appendChild(img);
        };
        reader.readAsDataURL(files[0]);
    }
};

// 2. フォーム送信時に、画像を含めてLocalStorageに保存する
document.getElementById('lotteryForm').addEventListener('submit', (e) => {
    e.preventDefault();
    
    // 入力データの取得
    const newEntry = {
        id: Date.now(),
        stageName: document.getElementById('stageName').value,
        image: currentImageData, // 変換した画像を保存
        startDate: document.getElementById('lotteryStartDate').value,
        endDate: document.getElementById('lotteryEndDate').value,
        notes: document.getElementById('notes').value
    };

    // 既存のデータに追加
    let lotteries = JSON.parse(localStorage.getItem('theaterLotteries')) || [];
    lotteries.push(newEntry);
    localStorage.setItem('theaterLotteries', JSON.stringify(lotteries));

    alert('登録しました！');
    location.reload();
});

// --- 以降、元々scriptファイルにあったリスト表示やカレンダーのコードをここに記述 ---
// (※もし元のscriptファイルの内容が手元になければ、最小限の表示機能を補足します)
</script>
</body>
</html>
