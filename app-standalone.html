<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stage Ticket Manager</title>
    <style>
        :root { --primary: #2c3e50; --accent: #8e44ad; --bg: #f8f9fa; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #ccc; display: inline-block; padding-bottom: 5px; }
        
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-top: 15px; color: var(--primary); }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .image-preview { width: 100%; height: 150px; border: 2px dashed #ddd; border-radius: 10px; margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        
        button { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; margin-top: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        .btn-add { background: transparent; color: var(--accent); border: 1px solid var(--accent); margin-top: 10px; padding: 8px; font-size: 0.8rem; }
        
        .list-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; align-items: center; border-left: 4px solid var(--primary); }
        .list-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: #eee; }
        .list-info { flex: 1; }
        .list-info strong { display: block; font-size: 1rem; }
        .list-info span { font-size: 0.75rem; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>Ticket Management</h1></div>

        <div class="card">
            <form id="ticketForm">
                <label>公演名</label>
                <input type="text" id="stageName" placeholder="Stage Name" required>

                <label>フライヤー / 画像</label>
                <div class="image-preview" id="previewContainer">
                    <span id="previewText">Tap to upload image</span>
                    <img id="previewImg" style="display:none;">
                </div>
                <input type="file" id="imageInput" accept="image/*" style="display:none;">

                <label>希望日程</label>
                <div id="datesContainer">
                    <input type="datetime-local" class="date-input" style="margin-bottom:5px;">
                </div>
                <button type="button" class="btn-add" id="addDateBtn">+ Add Date</button>

                <label>申込締切</label>
                <input type="date" id="deadline">

                <button type="submit">REGISTER</button>
            </form>
        </div>

        <div id="ticketList"></div>
    </div>

    <script>
        let tickets = JSON.parse(localStorage.getItem('myTickets')) || [];
        const imageInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImg = document.getElementById('previewImg');
        const previewText = document.getElementById('previewText');
        let currentImageData = "";

        // 画像選択
        previewContainer.onclick = () => imageInput.click();
        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    currentImageData = f.target.result;
                    previewImg.src = currentImageData;
                    previewImg.style.display = 'block';
                    previewText.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        };

        // 日程追加
        document.getElementById('addDateBtn').onclick = () => {
            const input = document.createElement('input');
            input.type = 'datetime-local';
            input.className = 'date-input';
            input.style.marginTop = '5px';
            document.getElementById('datesContainer').appendChild(input);
        };

        // 保存
        document.getElementById('ticketForm').onsubmit = (e) => {
            e.preventDefault();
            const dateInputs = document.querySelectorAll('.date-input');
            const selectedDates = Array.from(dateInputs).map(i => i.value).filter(v => v);

            const newTicket = {
                id: Date.now(),
                name: document.getElementById('stageName').value,
                dates: selectedDates,
                deadline: document.getElementById('deadline').value,
                image: currentImageData
            };

            tickets.push(newTicket);
            localStorage.setItem('myTickets', JSON.stringify(tickets));
            alert('登録しました');
            location.reload();
        };

        // リスト表示
        const listDiv = document.getElementById('ticketList');
        listDiv.innerHTML = tickets.map(t => `
            <div class="list-card">
                <img src="${t.image || 'https://via.placeholder.com/60'}" class="list-img">
                <div class="list-info">
                    <strong>${t.name}</strong>
                    <span>締切: ${t.deadline || '未設定'}</span><br>
                    <span>${t.dates.length}件の希望日</span>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
